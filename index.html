<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finvest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    a {
      display: block;
      margin: 10px 0;
      padding: 14px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      background: #2563eb;
      color: white;
      transition: 0.2s;
    }

    a:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    a:last-child {
      background: #ef4444;
    }

    a:last-child:hover {
      background: #dc2626;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Finvest</h1>
    <p>Finance and investment management app</p>

    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Use (EULA)</a>
    <a href="delete-account.html">Delete Account</a>

    <footer>
      © 2026 Finvest
    </footer>
  </div>

</body>
</html>
